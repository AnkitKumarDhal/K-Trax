general {
    lock_cmd          = pidof hyprlock || hyprlock  # prevent multiple instances
    unlock_cmd        = pkill -USR1 hyprlock         # wake hyprlock on resume
    before_sleep_cmd  = loginctl lock-session         # lock before suspend
    after_sleep_cmd   = bash -c "hyprctl dispatch 'hl.dsp.dpms({action = \"enable\"})'"
    inhibit_sleep = 0
    ignore_dbus_inhibit    = false                    # respect inhibitors (e.g. Firefox video, Steam)
    ignore_systemd_inhibit = false                    # respect systemd-inhibit calls
}

# 1. Dim display — 90s idle (OLED: minimize bright static pixels ASAP)
listener {
    timeout   = 90
    on-timeout = brightnessctl -s set 1%             # save & dim; never 0% on OLED
    on-resume  = brightnessctl -r                    # restore saved brightness
}

# 2. Lock screen — 3min idle (right after dim, minimize static lock screen burn-in)
listener {
    timeout   = 180
    on-timeout = loginctl lock-session
}

# 3. Display off — 3.5min idle (kill pixels shortly after lock)
listener {
    timeout   = 210
    on-timeout = bash -c "hyprctl dispatch 'hl.dsp.dpms({action = \"disable\"})'"
    on-resume  = bash -c "hyprctl dispatch 'hl.dsp.dpms({action = \"enable\"})' && sleep 1 && brightnessctl -r"
}

# 4. Suspend — 30min idle
listener {
    timeout   = 900
    on-timeout = systemctl suspend
}
