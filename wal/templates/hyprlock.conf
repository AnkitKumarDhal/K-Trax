bezier = linear, 1, 1, 0, 0
animation = slide, 1, 1, linear

background {{
    monitor =
    path = {wallpaper}   # Pywal automatically inserts your current wallpaper here!
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}}

# SMART INPUT FIELD (Enhanced)
input-field {{
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba({color4.rgb}, 1.0)
    inner_color = rgba({background.rgb}, 0.8)
    font_color = rgba({foreground.rgb}, 1.0)
    fade_on_empty = true
    fade_timeout = 1000
    rounding = 8
    check_color = rgba({color3.rgb}, 1.0)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##{foreground.strip}">Password...</span></i>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
}}

# DATE (Moved to bottom left for minimalism)
label {{
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba({foreground.rgb}, 1.0)
    font_size = 20
    font_family = SpaceMono Nerd Font Extrabold
    position = 40, 40
    halign = left
    valign = bottom
    shadow_passes = 2
}}

# TIME (Moved to bottom left)
label {{
    monitor =
    # Uses Pango sizing and opacity manipulation to anchor the seconds inline
    text = cmd[update:1000] echo "$(date +"%-I:%M")<span font_size='35pt' fgalpha='50%'>$(date +"%S")</span><span font_size='40pt'> </span><span font_size='80pt'>$(date +"%p")</span>"
    color = rgba({foreground.rgb}, 1.0)
    font_size = 120
    font_family = SpaceMono Nerd Font Extrabold
    position = 40, 60
    halign = left
    valign = bottom
    shadow_passes = 2
}}

# BATTERY STATUS (New)
label {{
    monitor =
    text = cmd[update:60000] echo "BAT: $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba({foreground.rgb}, 1.0)
    font_size = 16
    font_family = SpaceMono Nerd Font
    position = -40, 40
    halign = right
    valign = bottom
    shadow_passes = 2
}}

label {{
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/songinfo.sh
    color = rgba({color4.rgb}, 0.8)
    font_size = 13
    font_family = SpaceMono Nerd Font Extrabold
    position = 0, 30
    halign = center
    valign = bottom
}}

label {{
    monitor =
    text = cmd[update:3600000] echo "Good $(date +%H | awk '{{if ($1<12) print "morning"; else if ($1<18) print "afternoon"; else print "evening"}}'), <span font_style='italic' weight='bold' foreground='##{color4.strip}'>Sir $USER</span>."
    color = rgba({foreground.rgb}, 1.0)
    font_size = 40
    font_family = JetBrains Mono Light
    position = 0, -80
    halign = center
    valign = top
}}

label {{
    monitor =
    text = cmd[update:3600000] echo "󰖟  authenticated as <span weight='bold' foreground='##{color4.strip}'>$USER@arch</span>"
    color = rgba({foreground.rgb}, 0.6)
    font_size = 16
    font_family = SpaceMono Nerd Font Light
    position = 0, 30
    halign = center
    valign = center
}}
